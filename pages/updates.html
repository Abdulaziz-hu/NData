<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-mode-pre');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDUpdates | N(DATA)</title>
    <link rel="icon" href="/assets/logos/svg/ndata_logo.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/updates.css">
</head>
<body class="min-h-screen flex flex-col">

    <div id="site-nav"></div>

    <header class="px-4 sm:px-6 py-8 sm:py-12 md:py-24 max-w-7xl mx-auto w-full">
        <h1 class="text-4xl sm:text-5xl md:text-8xl font-black mb-4 sm:mb-6 leading-none" id="updates-title">
            P R O G R E S S<br><span class="text-red-600">+</span><br>U P D A T E S
        </h1>
    </header>

    <section id="filters-section" class="sticky-filters glass-panel px-4 sm:px-6 py-6 w-full">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-start sm:items-center mb-6">
                <div class="relative w-full sm:flex-1">
                    <input type="text" id="search-input" placeholder="SEARCH UPDATES..."
                        class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 bg-transparent font-mono text-sm focus:outline-none focus:border-red-600 transition-colors">
                    <i data-lucide="search" class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 opacity-50 pointer-events-none"></i>
                </div>
                <div class="flex items-center gap-2 font-mono text-sm opacity-60">
                    <span id="item-count">0</span>
                    <span id="posts-label">POSTS</span>
                </div>
            </div>
            <div id="category-filters" class="flex flex-wrap gap-3">
                <button class="btn-raw active" data-cat="all" id="filter-all">ALL</button>
                <button class="btn-raw" data-cat="news" id="filter-news">NEWS</button>
                <button class="btn-raw" data-cat="update" id="filter-updates">UPDATES</button>
                <button class="btn-raw" data-cat="blog" id="filter-blogs">BLOGS</button>
            </div>
        </div>
    </section>

    <section class="px-4 sm:px-6 max-w-7xl mx-auto w-full mb-24 flex-grow mt-8">
        <div id="loader" class="flex justify-center items-center py-20">
            <div class="loader"></div>
        </div>
        <div id="error-message" class="hidden text-center py-20">
            <h3 class="text-2xl sm:text-3xl mb-4 brand-font text-red-600">ERROR</h3>
            <p id="error-text" class="opacity-60 font-mono text-sm">Failed to load content. Please try again.</p>
        </div>
        <div id="no-results" class="hidden text-center py-20">
            <h3 class="text-2xl sm:text-3xl mb-4 brand-font" id="no-results-title">NO RESULTS</h3>
            <p class="opacity-60 font-mono text-sm" id="no-results-desc">Try adjusting your filters or search query</p>
        </div>
        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    </section>

    <!-- POST MODAL -->
    <div id="modal" class="fixed inset-0 z-[70] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="updatesApp.closeModal()"></div>
        <div id="modal-panel" class="absolute right-0 top-0 h-full w-full md:w-2/3 lg:w-1/2 glass-panel transform transition-transform duration-300 translate-x-full overflow-y-auto custom-scrollbar">
            <div class="p-6 sm:p-8">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex-1">
                        <span id="modal-type" class="text-xs font-bold bg-black text-white dark:bg-white dark:text-black px-2 py-1 uppercase tracking-wider inline-block mb-3"></span>
                        <h2 id="modal-title" class="text-2xl sm:text-3xl font-black mb-2 brand-font"></h2>
                        <div class="flex flex-wrap gap-3 items-center text-xs opacity-60 font-mono mb-4">
                            <span id="modal-date"></span>
                            <span>•</span>
                            <span id="modal-author"></span>
                        </div>
                    </div>
                    <button onclick="updatesApp.closeModal()" class="ml-4 p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full transition flex-shrink-0">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="modal-tags" class="flex flex-wrap gap-2 mb-6"></div>
                <div id="modal-content" class="modal-content-container mb-8 prose-like"></div>
                <div class="border-t border-gray-200 dark:border-gray-800 pt-6 flex flex-wrap gap-3">
                    <button onclick="updatesApp.sharePost()" class="btn-raw flex items-center gap-2">
                        <i data-lucide="share-2" class="w-4 h-4"></i>
                        <span id="btn-share">SHARE</span>
                    </button>
                    <button onclick="updatesApp.copyLink()" class="btn-raw flex items-center gap-2">
                        <i data-lucide="link" class="w-4 h-4"></i>
                        <span id="btn-copy-link">COPY LINK</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="/static/js/version.js"></script>
    <script src="/static/js/layout.js"></script>
    <script src="/static/js/updates-app.js"></script>
</body>
</html>
